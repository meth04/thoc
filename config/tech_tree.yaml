# tech_tree.yaml — tri thức nhân loại. Tech mở khi đủ điều kiện (auto) hoặc sớm hơn nhờ
# `de_xuat` hợp lệ của agent T3+ (engine khớp theo tu_khoa). Hiệu ứng vật chất chỉ áp dụng
# cho ai MUA/ÁP DỤNG công cụ tương ứng; tech xã hội (chữ viết) áp dụng toàn cục.

ky_nguyen:
  - {id: 1, ten: "Khai hoang",  model_floor: T0}
  - {id: 2, ten: "Làng xã",     model_floor: T0}
  - {id: 3, ten: "Chữ nghĩa",   model_floor: T1}
  - {id: 4, ten: "Tiền tệ",     model_floor: T1}
  - {id: 5, ten: "Tiền công nghiệp", model_floor: T2}

techs:
  - id: cay_go
    ten: "Cày gỗ"
    tu_khoa: [cày, bừa, luống]
    dieu_kien: {so_nguoi_E1: 3}
    hieu_ung: {mo_hang_hoa: [cong_cu], ghi_chu: "công cụ +30% năng suất (world.yaml)"}
  - id: thuy_loi
    ten: "Thủy lợi"
    tu_khoa: [mương, dẫn nước, tưới]
    dieu_kien: {tech: [cay_go], so_nguoi_E1: 8}
    hieu_ung: {giam_thiet_hai_han_lu: 0.5}
  - id: chu_viet
    ten: "Chữ viết"
    tu_khoa: [chữ, ghi chép, sổ sách, khế ước]
    dieu_kien: {so_nguoi_E2: 3}
    hieu_ung: {era: 3, mo_hanh_dong: [mo_ngan_hang, day_hoc_truong], giam_hoc_phi: 0.7}
  - id: khai_thac_go
    ten: "Nghề rừng"
    tu_khoa: [đốn, gỗ, rừng]
    dieu_kien: {so_nguoi_E1: 5}
    hieu_ung: {mo_hang_hoa: [go], mo_hanh_dong: [khai_thac_go]}
  - id: coi_xay
    ten: "Cối xay"
    tu_khoa: [xay, cối, nghiền]
    dieu_kien: {tech: [cay_go], so_nguoi_E2: 5}
    hieu_ung: {giam_hao_hut_kho: 0.5}
  - id: duc_tien
    ten: "Đúc tiền"
    tu_khoa: [đúc, tiền, xu, đồng]
    dieu_kien: {tech: [chu_viet], so_nguoi_E2: 6}
    hieu_ung: {era: 4, mo_hang_hoa: [dong], mo_hanh_dong: [khai_mo, duc_tien]}
  - id: y_thuat
    ten: "Y thuật"
    tu_khoa: [thuốc, chữa bệnh, thầy lang]
    dieu_kien: {so_nguoi_E2: 4}
    hieu_ung: {mo_hanh_dong: [chua_benh], giam_rui_ro_sinh_no: 0.5}
  - id: nghe_det
    ten: "Nghề dệt"
    tu_khoa: [dệt, vải, sợi]
    dieu_kien: {tech: [cay_go], so_nguoi_E1: 10}
    hieu_ung: {mo_hang_hoa: [vai]}
  - id: so_khai_cong_nghiep
    ten: "Xưởng thợ"
    tu_khoa: [xưởng, máy, guồng]
    dieu_kien: {tech: [coi_xay, duc_tien], so_nguoi_E3: 3}
    hieu_ung: {era: 5, tang_nang_suat_cong_cu: 1.2}
