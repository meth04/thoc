# models.yaml — thang trí tuệ, ID model THẬT (đã xác minh bằng smoke 2026-07-11).
# Gateway hỗ trợ nhiều route/tier: thử route đầu còn ngân sách, cạn thì tràn route sau.
# Code KHÔNG hardcode tên model — chỉ đọc file này.
#
# Thay đổi so với bản đầu (theo yêu cầu chủ dự án + kết quả smoke):
# - gemma-4-31b-it (Google trả 500) → gemini-3.1-flash-lite cho T0 + nền hồi ký.
# - gc/gemini-3-flash-preview, gc/gemini-3*-pro-preview chết upstream (404
#   "Requested entity was not found") → thang gc xếp lại bằng model còn sống:
#   T2 = 2.5-flash-lite, T3 = 2.5-flash, T4 = 2.5-pro (đỉnh).

tiers:
  T0:
    ten: "mù chữ"
    routes:
      - {provider: aistudio, model: "gemini-3.1-flash-lite"}
    temperature: 0.9
    max_output_tokens: 4096  # batch 8 quyết định ~2.4-3k tok — trần thấp sẽ cắt cụt
  T1:
    ten: "biết chữ (E1)"
    routes:                       # gộp 2 đường: ưu tiên key AI Studio, cạn thì tràn 9router
      - {provider: aistudio,  model: "gemini-3.1-flash-lite"}
      - {provider: ninerouter, model: "gc/gemini-3.1-flash-lite-preview"}
    temperature: 0.9
    max_output_tokens: 4096
  T2:
    ten: "E2"
    routes:
      - {provider: ninerouter, model: "gc/gemini-2.5-flash-lite"}
    temperature: 0.9
    max_output_tokens: 4096
  T3:
    ten: "E3"
    routes:
      - {provider: ninerouter, model: "gc/gemini-2.5-flash"}
    temperature: 0.9
    max_output_tokens: 4096
  T4:
    ten: "E4 — đỉnh"
    routes:
      - {provider: ninerouter, model: "gc/gemini-2.5-pro"}
    temperature: 0.9
    max_output_tokens: 4096
# 💡 Muốn hoán đổi sức mạnh T3/T4: chỉ cần đổi 2 dòng model — không đụng code.

# Việc nền (không phải "não" của agent nào)
nen_hoi_ky: {provider: aistudio, model: "gemini-3.1-flash-lite", temperature: 0.6, max_output_tokens: 400}
chronicle:  {provider: aistudio, model: "gemini-3.1-flash-lite", temperature: 0.8, max_output_tokens: 300}

mock:
  p_malformed_mac_dinh: 0.05
  p_malformed_test: 0.15
  gia_lap_latency: {mean_s: 1.2, std_s: 0.3}   # tắt bằng --fast

# Giá token XẤP XỈ (USD / 1 triệu token) — CHỈ để ước lượng chi phí trong telemetry,
# cập nhật theo bảng giá thật khi cần. Khớp theo chuỗi con trong tên model.
gia_token:
  mac_dinh: {vao: 0.10, ra: 0.40}
  "flash-lite":        {vao: 0.10, ra: 0.40}
  "2.5-flash":         {vao: 0.30, ra: 2.50}
  "2.5-pro":           {vao: 1.25, ra: 10.00}
  "3.1-flash-lite":    {vao: 0.10, ra: 0.40}
