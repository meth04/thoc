# world.yaml — mọi tham số thế giới. KHÔNG hardcode số nào trong code.
# Phase 1/4 được phép hiệu chỉnh để run đối chứng ổn định — mọi thay đổi ghi DECISIONS.md.

ban_do:
  kich_thuoc: [30, 30]
  song_bien_do_chia: 4    # sông uốn tối đa ±(rộng/4) quanh trục giữa
  ban_kinh_lang: 8        # bán kính gán thửa thuộc làng khi lập làng
  ty_le_ruong: 0.28   # 0.39→0.28 (hiệu chỉnh Phase 4): đất phải khan thì mới có làm thuê
  mau_mo: {min: 0.6, max: 1.4, bonus_ven_song: 0.2}
  so_o_mo_dong: 2
  so_lang_ban_dau: 1

thoi_gian:
  thang_moi_tick: 6
  tong_tick: 600
  thoi_tiet: {duoc_mua: {p: 0.2, he_so: 1.25},
              binh_thuong: {p: 0.6, he_so: 1.0},
              han_lu: {p: 0.2, he_so: 0.55}}

san_xuat:
  giong_kg_moi_thua: 60
  cong_moi_thua: 60            # 180 công/tick ÷ 60 = tự canh tối đa 3 thửa, khớp thua_toi_da
  san_luong_goc_kg: 600
  thua_toi_da_tu_canh: 3
  hieu_suat_thua_2_3: [0.85, 0.70]
  hao_hut_kho_moi_tick: 0.03
  homestead_tick_lien_tiep: 2
  recipe:                      # vật lý cố định cho hàng CƠ BẢN (hàng mới → blueprint)
    cong_cu: {cong: 60, go: 2, tang_nang_suat: 1.3, hao_mon_moi_tick_dung: 0.05}
    nha:     {cong: 240, go: 8}   # quá sức MỘT người một mùa (180 công) — dựng nhà cần
                                  # người góp công: gia đình hoặc thuê thợ (đổi công)
    xu:      {quang_dong: 1, cong: 5, ra: 10}
  khai_thac: {cong_moi_go: 10, cong_moi_quang: 20, can_cong_cu: true,
              hieu_suat_khong_cong_cu: 0.5}   # không công cụ vẫn khai thác được, nửa hiệu suất

nhu_cau:
  nguoi_lon_kg_tick: 90
  tre_em_kg_tick: 45
  ngay_cong_moi_tick: 180
  tre_em_gop_cong_tu_tuoi: 15   # 10→15: trẻ đi học, 15 tuổi mới phụ việc đồng áng
  ty_le_cong_tre_em: 0.3

lao_dong_theo_tuoi:              # người già dưỡng sức — sức lao động giảm tự nhiên
  tuoi_giam_suc: 60              # >60: công sinh ×0.5
  he_so_sau_giam: 0.5
  tuoi_nghi: 70                  # >70: gần như nghỉ hẳn
  he_so_sau_nghi: 0.15
  hao_suc_gia_moi_tick: 1.5      # >60 mỗi tick hao nhẹ sức khỏe (tuổi tác)

dat_dai:                         # đất canh liên tục thì bạc màu, bỏ hoang thì hồi dần
  thoai_hoa_moi_vu: 0.02         # cân với phục hồi mùa khô: net ~-1%/năm canh liên tục → kiệt sau ~70 năm
  phuc_hoi_moi_tick_bo_hoang: 0.008
  san_ty_le_mau_mo: 0.5          # không tụt dưới 50% độ màu nguyên thủy

danh_ca:                         # trữ lượng cá TÁI TẠO có hạn (logistic r·S·(1−S/K)) — đánh
  suc_chua_moi_o_kg: 600         # quá mức là sông cạn, cả làng cùng đói (bi kịch của chung)
  tai_sinh_moi_tick: 0.15        # tốc độ hồi trữ lượng; sản lượng bền vững ≈ r·K/4 mỗi ô
  ty_le_ton_ban_dau: 0.8         # trữ lượng t0 = 80% sức chứa
  cong_moi_kg_ca: 4.5            # ở mật độ đầy; cá thưa thì cùng công đó bắt được ÍT hơn
  ca_hao_moi_tick: 0.15          # cá tươi không trữ lâu
  nguong_mat_do_canh_bao: 0.3    # mật độ dưới ngưỡng → người đánh thấy sông cạn rõ
  ca_quy_doi_dinh_duong: 2.5     # 1kg cá no bằng 2.5kg thóc

tiec:                            # tiệc khao xóm — đổi của cải lấy quan hệ (kinh tế hồi báo)
  chi_phi_toi_thieu_thoc: 60     # quy thóc (thóc + thịt×quy đổi); ít hơn thì không ai đến
  khach_toi_da: 8
  tang_suc_khoe_khach: 4
  quan_he_moi_khach: 0.8
  ban_kinh_moi: 6                # mời khách trong bán kính này quanh nhà

trom:                            # vật lý cho phép lấy trộm — trị an, luật làng phải TỰ PHÁT SINH
  p_thanh_cong: 0.45
  ty_le_lay_toi_da: 0.25         # mỗi lần lấy được tối đa 25% kho nạn nhân
  quan_he_nan_nhan: -3.0         # bị bắt quả tang: nạn nhân thù
  quan_he_hang_xom: -1.0         # ... và cả xóm nạn nhân xa lánh
  nhieu_uoc_luong: 0.4           # nạn nhân chỉ ước lượng được lượng mất (±20%)
  ban_kinh_xom: 6                # xóm của nạn nhân (lan tiếng xấu khi bắt quả tang)
  xom_toi_da: 8

tay_nghe:                        # kinh nghiệm đồng áng tích qua mỗi vụ (learning by doing)
  tang_moi_vu: 0.004
  tran: 1.2

chan_nuoi:                       # vật lý chăn nuôi (gà) — nguồn thu nhập phụ
  ga_an_thoc_moi_tick: 2         # gà nửa thả rông tự kiếm ăn — chỉ tốn 2kg thóc/tick/con
  ga_con_an_thoc_moi_tick: 1     # gà con ăn ít hơn
  thit_moi_ga_con_kg: 3          # giết non thì ít thịt — nuôi 1 tick (6 tháng) mới thành gà
  ga_sinh_san_moi_tick: 0.15     # đàn tăng 15%/tick nếu no đủ
  ga_toi_da_moi_ho: 25           # quá đông thì dịch bệnh kìm đàn
  bat_ga_cong_moi_con: 30        # bắt gà rừng: 30 công/con (cần ô rừng trong làng)
  thit_moi_ga_kg: 8              # giết 1 gà → 8kg thịt
  thit_hao_moi_tick: 0.2         # thịt không trữ lâu được (hao 20%/tick)
  thit_quy_doi_dinh_duong: 3.0   # 1kg thịt no bằng 3kg thóc
  ga_chet_gia_moi_tick: 0.05     # tử suất tự nhiên của đàn (gà già, chồn cáo)

suc_khoe:
  hoi_khi_an_du: 10
  nguong_phan_loai_chet_doi: 50   # chết khi vừa đói + health dưới ngưỡng → nhãn chet_doi
  mat_toi_da_khi_doi: 25
  mat_khi_vo_gia_cu_mua_mua: 10
  nguong_nguy_kich: 20
  p_chet_khi_nguy_kich: 0.35

cu_soc:
  # Cú sốc ngoài thời tiết: tắt trong benchmark khép kín để giữ tương thích lịch sử run.
  # Scenario thực chứng có thể bật với chuỗi/xác suất và hiệu ứng có provenance riêng.
  dich_benh: {bat: false, xac_suat_moi_nam: 0.0, mat_suc_khoe_moi_tick: 0.0}

nhan_khau:
  dan_so_ban_dau: 50
  tuoi_ban_dau: [16, 28]
  ty_le_nu: 0.52
  tuoi_truong_thanh: 16
  sinh_san: {p_goc: 0.15, tuoi_me: [16, 45], rui_ro_me: 0.02, hoi_y_dinh_moi_n_tick: 20,
             y_te_giam_rui_ro_san: 0.2}   # rủi ro sinh nở không giảm dưới 20% mức gốc
  # p_goc 0.22 → 0.15: hiệu chỉnh Phase 1 để dân số cân bằng ≤500 (xem DECISIONS.md)
  tu_vong_gompertz: {q20: 0.005, q60: 0.03, q75: 0.12}
  tu_vong_noi_suy: {moc_tuoi: [20, 60, 75], tran_q_nam: 0.8}  # mốc nội suy log-linear + trần q/năm
  dot_bien_persona: {bien_do: 2, min: 1, max: 9}  # con = trung bình cha mẹ ± biên độ, clip [min,max]
  di_chuc: {tuoi_trigger: 50, health_trigger: 30}

khoi_tao:                        # tài sản + phân bố t0 (chỉ dùng khi tạo thế giới mới)
  thoc_moi_nguoi: 200
  persona_min: 1
  persona_max: 9
  phan_bo_e: [0.80, 0.96]        # r<0.80 → E0, r<0.96 → E1, còn lại E2 (gieo mầm tri thức)

phap_nhan:                       # tham số vật lý pháp nhân (KHÔNG phải định chế có tên)
  von_luu_dong_san: 4000         # thóc giữ lại tối thiểu trước khi chia lợi nhuận
  he_so_dem_nghia_vu: 2.0        # đệm = max(sàn, nghĩa vụ × hệ số)
  giai_the_sau_tick: 24          # entity cạn vốn kéo dài quá N tick → tự giải thể
  giai_the_thoc_duoi: 50         # ... khi thóc < ngưỡng này và không có đất

tieu_dung:
  he_so_tien_nghi_health: 10.0   # health cộng thêm = độ lớn hiệu ứng × hệ số này
  nguong_an_doi_event: 0.75      # tỷ lệ no dưới ngưỡng này mới ghi event an_doi
  san_hao_kho: 0.1               # blueprint lưu kho không giảm hao hụt dưới 10% mức gốc

giao_duc:                      # bac: [hoc_phi_goi_y_thoc_tick, so_tick, phan_cong_mat]
  E1: [40, 2, 0.5]             # học phí THẬT do hợp đồng hai bên quyết — số này chỉ là
  E2: [80, 4, 0.5]             # gợi ý trong prompt & giá của rulebot/mock
  E3: [160, 6, 0.5]
  E4: [320, 8, 0.5]
  ban_kinh_thay: 5
  cha_me_day_E1_tai_nha: true

hop_dong:
  van_ban_can_E_nguoi_soan: 1
  uy_tin: {phat_vi_pham_mieng: -0.5, lan_tin_don_buoc: 2, decay_moi_nam: 0.05,
           he_so_lan_tin_don: 0.2}   # người quen nạn nhân dè chừng = phạt × hệ số
  mac_ca_toi_da_vong: 3
  de_nghi_het_han_tick: 4        # đề nghị trên bảng rao không ai nhận → gỡ sau N tick
  mau_khoi_dau:                # imitation pool khởi đầu — CHỈ 2 mẫu tối giản
    - "doi_cong_lay_thoc_mot_lan"
    - "cho_muon_co_hoan_tra"

thuong_mai:
  phi_van_chuyen_moi_khoang_cach: 0.02
  cua_so_gia_tick: 4             # giá "gần nhất" = trong vòng N tick
  nhieu_tin_don_gia: 0.15
  chuan_hoa_khoang_cach: 10      # phí = giá trị × phí/kc × (kc / chuẩn hóa)
  niem_yet_het_han_tick: 4       # niêm yết đất không ai mua → tự gỡ sau N tick
  rao_vat_toi_da: 20             # số lệnh chợ thành tin rao vặt mỗi tick (lấy mẫu seeded)

hanh_vi:
  dat_dai:
    # Neo kỳ vọng để tác nhân ra ask/bid khi đất chưa có giá khớp. Đây KHÔNG phải
    # giá do engine áp; call auction/sealed bid vẫn quyết định giá giao dịch cuối cùng.
    ty_le_san_luong_chu_dat: 0.35
    chiet_khau_moi_tick: 0.20
    ky_han_dinh_gia_tick: 6
    trong_so_gia_thi_truong: 0.60

di_cu:                           # luật vật lý lập làng mới (không phải định chế)
  so_thua_toi_thieu: 8           # cần cụm ruộng công đủ rộng
  cach_lang_toi_thieu: 10        # cách mọi làng hiện có ít nhất N ô
  ban_kinh_cum: 6                # cụm tính trong bán kính này quanh thửa tâm

quan_sat:                      # ngưỡng để OBSERVATORY dán nhãn (không phải cơ chế engine)
  cua_so_tick: 4               # cửa sổ trượt cho cơ cấu công/thanh toán/thu nhập
  cua_so_dat_tick: 8           # cửa sổ metric price / expected-net-output của giao dịch đất
  snapshot_moi_n_tick: 10      # chu kỳ ghi giai_cap_snapshot (chỉ logging)
  nguong_sigma_phi_ly: 3.0     # giao dịch lệch >Nσ so mặt bằng lịch sử = "phi lý trí"
  min_diem_gia_phi_ly: 5       # cần ≥N điểm giá của mặt hàng mới tính σ (bounded rationality)
  ngan_hang: {nghia_vu_hoan_tra_toi_thieu_thoc: 1500, so_chu_no_toi_thieu: 5}
  bao_hiem: {so_hop_dong_su_kien_toi_thieu: 5}
  xuong: {so_hop_dong_gop_cong_toi_thieu: 3}
  thi_truong_co_phan: {giao_dich_moi_nam_toi_thieu: 4}
  tien_te_hoa: {ty_le_gia_tri_thanh_toan_bang_xu: 0.5}
  cong_nghiep_hoa:
    ty_trong_cong_phi_nong_toi_thieu: 0.40
    so_may_hoat_dong_toi_thieu: 5
    # 0.25→0.10 (hiệu chỉnh Phase 4, DECISIONS.md): nước Anh giữa thế kỷ 19 —
    # đỉnh cách mạng công nghiệp — lao động nhà máy cũng chỉ ~10-15% lực lượng
    ty_le_lao_dong_trong_entity_5_nguoi: 0.10

giai_cap:                      # ngưỡng classifier (SPEC 9.1)
  chu_xuong_gop_cong_toi_thieu: 3
  dia_chu_percentile_dat: 90
  dia_chu_ty_le_thu_nhap_dat: 0.5
  phu_nong_percentile_dat: 75
  cong_nhan_ty_le_thu_nhap_gop_cong: 0.6
  ta_dien_ty_le_dat_thue: 0.5
  cua_so_thu_nhap_tick: 4

quan_he:
  ban_kinh_lang_gieng: 4         # hàng xóm = trong bán kính này quanh nơi cư trú
  lang_gieng_toi_da: 5
  cong_moi_tuong_tac: 0.1
  decay_moi_nam: 0.02            # quan hệ không nuôi thì nhạt dần (áp cuối mỗi năm)
  nguong_xoa_canh: 0.05          # |trọng số| dưới ngưỡng → cạnh bị quên hẳn

chinh_tri:                       # nhà nước TỰ PHÁT SINH — engine chỉ cấp cơ chế trung lập
  bat: true                      # cờ scenario: bật/tắt TOÀN BỘ tầng chính trị (bầu cử/lập
                                 # pháp/hối lộ/nghiệp đoàn/đình công/thuế/bạo động). Mặc định
                                 # TRUE → preindustrial_closed_v1 + mọi run cũ giữ nguyên hành
                                 # vi + world-hash. agrarian_transition_v1 đặt false (ADR 0001 §C).
  bau_cu_moi_n_tick: 10          # chu kỳ bầu cử (10 năm); ứng cử/bỏ phiếu do agent tự phát
  nhiem_ky_tick: 10              # nhiệm kỳ trưởng làng (bằng chu kỳ bầu → tái cử mỗi kỳ)
  thue_suat_toi_da: 0.5          # trần thuế suất trưởng làng được đặt (engine cưỡng chế)
  gini_nguong_bao_dong: 0.85     # HẰNG VẬT LÝ: Gini thóc trên ngưỡng này mới có thể bạo động
  ty_le_so_dong_bao_dong: 0.3    # cần ≥30% người lớn cùng bạo động thì mới thành sung công
  ty_le_sung_cong_bao_dong: 0.3  # sung công 30% thóc nhóm giàu nhất → chia đều nhóm nghèo nhất
  phan_vi_giau_ngheo: 10         # top/bottom 1/N dùng khi một treatment bạo động được kích hoạt

fiscal:                          # tài khóa/khu vực công — ADR 0004 §T08-C, cổng định chế §5
  bat: false                     # MẶC ĐỊNH TẮT: preindustrial_closed_v1 + mọi run cũ giữ
                                 # nguyên hành vi + world-hash (treasury/thủy lợi chỉ tồn tại
                                 # khi TRUE). agrarian_transition_v1 bật như treatment (T08).
                                 # Khi TRUE: thu_thue_va_chia GIỮ thuế trong CONG_QUY (không
                                 # rebate); trưởng làng chi_cong xây thủy lợi; thủy lợi hao mòn.
  chi_phi_thoc_moi_don_vi: 400   # thóc TỪ CONG_QUY (treasury) để xây 1 đơn vị thủy lợi
  chi_phi_go_moi_don_vi: 4       # gỗ trưởng làng góp (vật liệu công trình)
  chi_phi_cong_moi_don_vi: 60    # công trưởng làng góp (lao động tổ chức) — chi phí đo được
  hao_mon_ty_le_moi_tick: 0.05   # thủy lợi hao mòn 5%/tick (không duy trì thì mất dần)
  nguong_duy_tri_don_vi: 1.0     # cần tồn ≥ ngưỡng này thủy lợi mới giảm thiệt hại mất mùa
  he_so_loi_ich_han_lu: 0.5      # giảm % thiệt hại hạn/lũ cho cộng đồng có thủy lợi (0 = placebo)
  chi_cong_toi_da_moi_tick: 5    # trần số đơn vị xây/tick (chống spam intent)

minds:
  ky_uc_toi_da: 10
  ky_uc_doi_toi_da: 12   # dấu mốc đời không trôi (cưới, sinh, tang, đất, nhà, ân oán)               # ký ức đời người — giữ N biến cố gần nhất
  batch_toi_da: 8            # (di sản batch cũ — kiến trúc 1-to-1 không còn gộp agent)
  concurrency: 48            # PART 5: TRẦN số call LLM song song/tick. Real TỰ CO GIÃN
                             # theo số key (2×số_key+4, chặn bởi trần này) — nhiều key thì
                             # chạy song song nhiều hơn; 2 key→8, 20 key→44, 30 key→48.
  dung_cong_cu_the_gioi: true   # PART 5 MCP BẬT: mỗi agent tự hỏi thế giới nhiều lượt rồi
                                # mới quyết — call/agent LINH ĐỘNG 1..cong_cu_max_luot
  cong_cu_max_luot: 10       # trần số lượt gọi công cụ/agent/tick (LLM tự dừng khi đủ)
  nghi_dinh_ky_moi_n_tick: 4   # 1→4: giữ ~60% agent chạy thẻ (canh tác ổn định) — every-agent
                               # gây bi kịch commons cold-start (LLM hoảng-loạn đánh cá); MCP
                               # vẫn cho 40% người-nghĩ deliberate sâu 1-10 lượt
  nguong_trigger_gia: 0.30
  hoi_ky_token_toi_da: 250
  gia_huan_token_toi_da: 100
  nhieu_tham_so_so: 0.10
  mau_hop_dong_trong_prompt_top_k: 5   # mẫu ĐANG LƯU HÀNH thật, ẩn danh hóa
  chronicle_moi_n_tick: 20
  checkpoint_moi_n_tick: 10
  reflection_moi_n_tick: 10   # tự phản tư: cô đọng ký ức+ân oán → niềm tin cốt lõi (5.3)
  p2p_gui_toi_da: 3           # PART 5.4: mỗi agent gửi tối đa N tin/tick
  p2p_hom_thu_toi_da: 5       # hòm thư mỗi người nhận tối đa N tin/tick (chống spam)
  san_an_toi_thieu:
    # Survival floor thuộc tầng hành vi, không phải luật sản xuất: khi hộ dưới N kỳ ăn
    # và LLM/thẻ không ai dự định canh trong mùa gieo, bổ sung 1 thửa khả thi + event.
    bat: true
    du_tru_toi_thieu_tick: 3.0
